<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose Your Course</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
 
  <div class="card">
    <h2 class="title">Choose Your Course</h2>
 
    <div class="options">
 
      <label class="option">
        <input type="radio" name="course" value="html-css" />
        <span class="radio-dot"></span>
        <span class="course-name">HTML &amp; CSS</span>
        <span class="price">100$/year</span>
      </label>
 
      <label class="option">
        <input type="radio" name="course" value="javascript" />
        <span class="radio-dot"></span>
        <span class="course-name">JavaScript</span>
        <span class="price">120$/year</span>
      </label>
 
      <label class="option">
        <input type="radio" name="course" value="php-mysql" />
        <span class="radio-dot"></span>
        <span class="course-name">PHP &amp; MySQL</span>
        <span class="price">150$/year</span>
      </label>
 
    </div>
  </div>
 
</body>
</html>
